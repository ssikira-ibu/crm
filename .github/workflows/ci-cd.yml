name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # On PRs: cancel superseded runs per ref.
  # On push to main: serialize deploys so two merges in quick succession don't race.
  group: ${{ github.event_name == 'pull_request' && format('ci-{0}', github.ref) || 'deploy-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace @crm/shared

      - name: Backend — prisma generate
        run: npm run db:generate --workspace @crm/backend

      - name: Backend — typecheck
        run: npm run build --workspace @crm/backend

      - name: Backend — test
        run: npm test --workspace @crm/backend

      - name: Frontend — lint
        run: npm run lint --workspace @crm/frontend

      - name: Frontend — typecheck
        run: npm run typecheck --workspace @crm/frontend

      - name: Frontend — build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.example.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
        run: npm run build --workspace @crm/frontend

  build:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target }}/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          # NEXT_PUBLIC_* vars are inlined into the client bundle at build time
          # by Next.js. Setting them only at runtime (compose env) leaves the
          # browser bundle empty. The frontend Dockerfile accepts matching ARGs.
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: docker-compose.prod.yml

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ~/crm

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,IMAGE_PREFIX,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd ~/crm

            # Source production env
            set -a && source .env && set +a
            export IMAGE_PREFIX="${IMAGE_PREFIX}"

            # Capture previous tag for rollback (falls back to 'latest' on first deploy)
            PREVIOUS_TAG="$(cat .last_deployed_tag 2>/dev/null || echo latest)"
            export IMAGE_TAG="${IMAGE_TAG}"

            # Login to GHCR
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            # Pull new images and deploy
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for services, then verify health
            echo "Waiting for services to be healthy..."
            sleep 10

            healthcheck() {
              docker compose -f docker-compose.prod.yml exec -T backend \
                wget -qO- http://localhost:3000/health > /dev/null 2>&1
            }

            if ! healthcheck; then
              echo "Backend health check failed — rolling back to ${PREVIOUS_TAG}"
              export IMAGE_TAG="${PREVIOUS_TAG}"
              docker compose -f docker-compose.prod.yml pull backend frontend || true
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              sleep 10
              if ! healthcheck; then
                echo "Rollback also failed — manual intervention required"
                exit 2
              fi
              echo "Rollback successful; new deploy aborted"
              exit 1
            fi

            # Record successful tag for next rollback
            echo "${IMAGE_TAG}" > .last_deployed_tag

            echo "Deploy successful"
            docker image prune -f
