name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target }}/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml
            Caddyfile

      - name: Copy compose and Caddyfile to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ~/crm

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,IMAGE_PREFIX,GHCR_TOKEN,GHCR_USER
          script: |
            cd ~/crm

            # Source production env
            set -a && source .env && set +a
            export IMAGE_TAG="${IMAGE_TAG}"
            export IMAGE_PREFIX="${IMAGE_PREFIX}"

            # Login to GHCR
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            # Pull new images and deploy
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health checks
            echo "Waiting for services to be healthy..."
            sleep 10

            # Verify backend health
            if ! docker compose -f docker-compose.prod.yml exec -T backend wget -qO- http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend health check failed"
              exit 1
            fi

            echo "Deploy successful"
            docker image prune -f
