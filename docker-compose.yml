services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://crm_user:crm_password@db:5432/crm_dev?schema=public
      PORT: "3000"
      NODE_ENV: development
      GOOGLE_APPLICATION_CREDENTIALS: /app/backend/firebase-service-account.json
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./packages/shared/src:/app/packages/shared/src
      - ./firebase-service-account.json:/app/backend/firebase-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app/backend && npx prisma migrate deploy && npx tsx watch src/index.ts"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    ports:
      - "3001:3001"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      - backend

volumes:
  pgdata:
